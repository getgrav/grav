title: PLUGIN_ADMIN.SECURITY

form:
    validation: loose
    fields:

        xss_section:
            type: section
            title: PLUGIN_ADMIN.XSS_SECURITY
            underline: true

        xss_whitelist:
            type: selectize
            size: large
            label: PLUGIN_ADMIN.XSS_WHITELIST_PERMISSIONS
            help: PLUGIN_ADMIN.XSS_WHITELIST_PERMISSIONS_HELP
            placeholder: 'admin.super'
            classes: fancy
            validate:
                type: commalist

        xss_enabled.on_events:
            type: toggle
            label: PLUGIN_ADMIN.XSS_ON_EVENTS
            highlight: 1
            options:
                1: PLUGIN_ADMIN.YES
                0: PLUGIN_ADMIN.NO
            default: true
            validate:
                type: bool

        xss_enabled.invalid_protocols:
            type: toggle
            label: PLUGIN_ADMIN.XSS_INVALID_PROTOCOLS
            highlight: 1
            options:
                1: PLUGIN_ADMIN.YES
                0: PLUGIN_ADMIN.NO
            default: true
            validate:
                type: bool

        xss_invalid_protocols:
            type: selectize
            size: large
            label: PLUGIN_ADMIN.XSS_INVALID_PROTOCOLS_LIST
            classes: fancy
            validate:
                type: commalist

        xss_enabled.moz_binding:
            type: toggle
            label: PLUGIN_ADMIN.XSS_MOZ_BINDINGS
            highlight: 1
            options:
                1: PLUGIN_ADMIN.YES
                0: PLUGIN_ADMIN.NO
            default: true
            validate:
                type: bool

        xss_enabled.html_inline_styles:
            type: toggle
            label: PLUGIN_ADMIN.XSS_HTML_INLINE_STYLES
            highlight: 1
            options:
                1: PLUGIN_ADMIN.YES
                0: PLUGIN_ADMIN.NO
            default: true
            validate:
                type: bool

        xss_enabled.dangerous_tags:
            type: toggle
            label: PLUGIN_ADMIN.XSS_DANGEROUS_TAGS
            highlight: 1
            options:
                1: PLUGIN_ADMIN.YES
                0: PLUGIN_ADMIN.NO
            default: true
            validate:
                type: bool

        xss_dangerous_tags:
            type: selectize
            size: large
            label: PLUGIN_ADMIN.XSS_DANGEROUS_TAGS_LIST
            classes: fancy
            validate:
                type: commalist

        twig_sandbox_section:
            type: section
            title: PLUGIN_ADMIN.TWIG_SANDBOX
            text: PLUGIN_ADMIN.TWIG_SANDBOX_HELP
            underline: true

        twig_sandbox.enabled:
            type: toggle
            label: PLUGIN_ADMIN.TWIG_SANDBOX_ENABLED
            help: 'Renders editor-authored page content inside an allowlist-based Twig SecurityPolicy. <strong>Disabling removes the only protection against template-injection attacks via page content</strong>: any account with editor-level access (or anyone who compromises the file system) can execute arbitrary PHP via Twig. Only turn off if a site genuinely needs container access from page content and you fully trust every author.'
            highlight: 1
            options:
                1: PLUGIN_ADMIN.YES
                0: PLUGIN_ADMIN.NO
            default: true
            validate:
                type: bool

        twig_sandbox.logging:
            type: toggle
            label: PLUGIN_ADMIN.TWIG_SANDBOX_LOGGING
            help: PLUGIN_ADMIN.TWIG_SANDBOX_LOGGING_HELP
            highlight: 1
            options:
                1: PLUGIN_ADMIN.YES
                0: PLUGIN_ADMIN.NO
            default: true
            validate:
                type: bool

        twig_sandbox.admin_hint:
            type: toggle
            label: PLUGIN_ADMIN.TWIG_SANDBOX_ADMIN_HINT
            help: 'When the sandbox blocks an expression, append a one-line HTML comment to the rendered page so super-admins viewing the source see that something was filtered. Visitors and non-admins see nothing.'
            highlight: 1
            options:
                1: PLUGIN_ADMIN.YES
                0: PLUGIN_ADMIN.NO
            default: true
            validate:
                type: bool

        twig_sandbox.allowed_tags:
            type: selectize
            size: large
            label: PLUGIN_ADMIN.TWIG_SANDBOX_ALLOWED_TAGS
            help: PLUGIN_ADMIN.TWIG_SANDBOX_ALLOWED_TAGS_HELP
            classes: fancy
            validate:
                type: commalist

        twig_sandbox.allowed_filters:
            type: selectize
            size: large
            label: PLUGIN_ADMIN.TWIG_SANDBOX_ALLOWED_FILTERS
            help: PLUGIN_ADMIN.TWIG_SANDBOX_ALLOWED_FILTERS_HELP
            classes: fancy
            validate:
                type: commalist

        twig_sandbox.allowed_functions:
            type: selectize
            size: large
            label: PLUGIN_ADMIN.TWIG_SANDBOX_ALLOWED_FUNCTIONS
            help: PLUGIN_ADMIN.TWIG_SANDBOX_ALLOWED_FUNCTIONS_HELP
            classes: fancy
            validate:
                type: commalist

        twig_sandbox.allowed_methods:
            type: list
            label: PLUGIN_ADMIN.TWIG_SANDBOX_ALLOWED_METHODS
            help: PLUGIN_ADMIN.TWIG_SANDBOX_ALLOWED_METHODS_HELP
            style: vertical
            collapsed: true
            fields:
                .class:
                    type: text
                    label: PLUGIN_ADMIN.TWIG_SANDBOX_CLASS
                    size: large
                    validate:
                        required: true
                .methods:
                    type: text
                    label: PLUGIN_ADMIN.TWIG_SANDBOX_METHODS
                    size: large
                    placeholder: 'get, toarray, value'

        twig_sandbox.allowed_properties:
            type: list
            label: PLUGIN_ADMIN.TWIG_SANDBOX_ALLOWED_PROPERTIES
            help: PLUGIN_ADMIN.TWIG_SANDBOX_ALLOWED_PROPERTIES_HELP
            style: vertical
            collapsed: true
            fields:
                .class:
                    type: text
                    label: PLUGIN_ADMIN.TWIG_SANDBOX_CLASS
                    size: large
                    validate:
                        required: true
                .methods:
                    type: text
                    label: PLUGIN_ADMIN.TWIG_SANDBOX_PROPERTIES
                    size: large
                    placeholder: 'header, media'

        uploads_section:
            type: section
            title: PLUGIN_ADMIN.UPLOADS_SECURITY
            underline: true


        uploads_dangerous_extensions:
            type: selectize
            size: large
            label: PLUGIN_ADMIN.UPLOADS_DANGEROUS_EXTENSIONS
            help: PLUGIN_ADMIN.UPLOADS_DANGEROUS_EXTENSIONS_HELP
            classes: fancy
            validate:
                type: commalist


        sanitize_svg:
            type: toggle
            label: PLUGIN_ADMIN.SANITIZE_SVG
            help: PLUGIN_ADMIN.SANITIZE_SVG_HELP
            highlight: 1
            options:
                1: PLUGIN_ADMIN.YES
                0: PLUGIN_ADMIN.NO
            default: true
            validate:
                type: bool
