            options:
                1: PLUGIN_ADMIN.YES
                0: PLUGIN_ADMIN.NO
            default: true
            validate:
                type: bool

        twig_filter.whitelist.functions:
            type: selectize
            size: large
            label: PLUGIN_ADMIN.TWIG_FILTER_WHITELIST_FUNCTIONS
            help: PLUGIN_ADMIN.TWIG_FILTER_WHITELIST_FUNCTIONS_HELP
            classes: fancy
            validate:
                type: commalist

        twig_filter.whitelist.filters:
            type: selectize
            size: large
            label: PLUGIN_ADMIN.TWIG_FILTER_WHITELIST_FILTERS
