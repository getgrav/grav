            validate:
                type: bool

        xss_enabled.dangerous_tags:
            type: toggle
            label: PLUGIN_ADMIN.XSS_DANGEROUS_TAGS
            highlight: 1
            options:
                1: PLUGIN_ADMIN.YES
                0: PLUGIN_ADMIN.NO
            default: true
            validate:
                type: bool

        xss_dangerous_tags:
            type: selectize
            size: large
            label: PLUGIN_ADMIN.XSS_DANGEROUS_TAGS_LIST
            classes: fancy
            validate:
                type: commalist

        twig_filter_section:
            type: section
            title: PLUGIN_ADMIN.TWIG_FILTER
            underline: true

        twig_filter.enabled:
            type: toggle
            label: PLUGIN_ADMIN.TWIG_FILTER_ENABLED
            help: PLUGIN_ADMIN.TWIG_FILTER_ENABLED_HELP
            highlight: 1
            options:
                1: PLUGIN_ADMIN.YES
                0: PLUGIN_ADMIN.NO
