        twig_sandbox.allowed_tags:
            type: selectize
            size: large
            label: PLUGIN_ADMIN.TWIG_SANDBOX_ALLOWED_TAGS
            help: PLUGIN_ADMIN.TWIG_SANDBOX_ALLOWED_TAGS_HELP
            classes: fancy
            validate:
                type: commalist

        twig_sandbox.allowed_filters:
            type: selectize
            size: large
            label: PLUGIN_ADMIN.TWIG_SANDBOX_ALLOWED_FILTERS
            help: PLUGIN_ADMIN.TWIG_SANDBOX_ALLOWED_FILTERS_HELP
            classes: fancy
            validate:
                type: commalist

        twig_sandbox.allowed_functions:
            type: selectize
            size: large
            label: PLUGIN_ADMIN.TWIG_SANDBOX_ALLOWED_FUNCTIONS
            help: PLUGIN_ADMIN.TWIG_SANDBOX_ALLOWED_FUNCTIONS_HELP
            classes: fancy
            validate:
                type: commalist

        twig_sandbox.allowed_methods:
            type: list
            label: PLUGIN_ADMIN.TWIG_SANDBOX_ALLOWED_METHODS
            help: PLUGIN_ADMIN.TWIG_SANDBOX_ALLOWED_METHODS_HELP
            style: vertical
            collapsed: true
            fields:
                .class:
                    type: text
                    label: PLUGIN_ADMIN.TWIG_SANDBOX_CLASS
                    size: large
                    validate:
                        required: true
                .methods:
                    type: text
                    label: PLUGIN_ADMIN.TWIG_SANDBOX_METHODS
                    size: large
                    placeholder: 'get, toarray, value'

        twig_sandbox.allowed_properties:
            type: list
            label: PLUGIN_ADMIN.TWIG_SANDBOX_ALLOWED_PROPERTIES
            help: PLUGIN_ADMIN.TWIG_SANDBOX_ALLOWED_PROPERTIES_HELP
            style: vertical
            collapsed: true
            fields:
                .class:
                    type: text
                    label: PLUGIN_ADMIN.TWIG_SANDBOX_CLASS
                    size: large
                    validate:
                        required: true
                .methods:
                    type: text
                    label: PLUGIN_ADMIN.TWIG_SANDBOX_PROPERTIES
                    size: large
                    placeholder: 'header, media'

        uploads_section:
            type: section
            title: PLUGIN_ADMIN.UPLOADS_SECURITY
            underline: true


        uploads_dangerous_extensions:
