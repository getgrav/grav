            help: PLUGIN_ADMIN.TWIG_FILTER_WHITELIST_PROPERTIES_HELP
            classes: fancy
            validate:
                type: commalist

        twig_sandbox_section:
            type: section
            title: PLUGIN_ADMIN.TWIG_SANDBOX
            text: PLUGIN_ADMIN.TWIG_SANDBOX_HELP
            underline: true

        twig_sandbox.enabled:
            type: toggle
            label: PLUGIN_ADMIN.TWIG_SANDBOX_ENABLED
            help: PLUGIN_ADMIN.TWIG_SANDBOX_ENABLED_HELP
            highlight: 1
            options:
                1: PLUGIN_ADMIN.YES
                0: PLUGIN_ADMIN.NO
            default: true
            validate:
                type: bool

        twig_sandbox.logging:
            type: toggle
            label: PLUGIN_ADMIN.TWIG_SANDBOX_LOGGING
            help: PLUGIN_ADMIN.TWIG_SANDBOX_LOGGING_HELP
